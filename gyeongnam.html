<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경기도 여행지</title>
    <link rel="stylesheet" href="tstyle.css"/>
    <style>
        .region-hero {
            padding: 20px 40px 40px;
            border-bottom: 1px solid #d6cfc4;
        }

        .region-back {
            font-size: 0.8rem;
            color: #8a7f74;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }
        .region-back:hover { color: #c0392b; }

        .region-name {
            font-family: serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .region-desc {
            font-size: 0.95rem;
            color: #8a7f74;
            font-weight: 300;
            line-height: 1.8;
        }

        .section { padding: 40px; }

        .section-header {
            font-family: serif;
            font-size: 1.25rem;
            font-weight: 700;
            padding-bottom: 14px;
            margin-bottom: 28px;
            border-bottom: 1px solid #d6cfc4;
        }

        /* 여행지 */
        .spot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: #d6cfc4;
            border: 1px solid #d6cfc4;
        }

        .spot-card {
            background: #fff;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .spot-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
            align-items: center;
            justify-content: center;
            color: #d6cfc4;
            font-size: 0.75rem;
            border-radius: 2px;
        }

        .spot-name {
            font-family: serif;
            font-size: 1rem;
            font-weight: 700;
        }

        .spot-desc {
            font-size: 0.82rem;
            color: #8a7f74;
            font-weight: 300;
            line-height: 1.7;
        }

        /* 음식 */
        .food-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            border: 1px solid #d6cfc4;
            background: #d6cfc4;
        }

        .food-item {
            background: #fff;
            padding: 22px 28px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .food-num {
            font-family: serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #d6cfc4;
            width: 36px;
            flex-shrink: 0;
        }

        .food-name {
            font-family: serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .food-desc {
            font-size: 0.8rem;
            color: #8a7f74;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="region-hero">
        <a class="region-back" href="tmap1.html">← 지도로 돌아가기</a>
        <h1 class="region-name">경상남도</h1>
        <p class="region-desc">바다의 푸른 낭만과 산의 짙은 힐링이 공존하는 남해안 관광의 중심지.</p>
    </div>

    <div class="section">
        <div class="section-header">대표 여행지</div>
        <div class="spot-grid">
            <div class="spot-card">
                <img src="진주성.jpg" alt="진주성" class="spot-img">
                <div class="spot-name">진주성</div>
                <div class="spot-desc">임진왜란 당시에 가장 치열하던 전투 중 하나인 진주 대첩의 현장. 둘레 1.7 km의 석성.</div>
            </div>
            <div class="spot-card">
                <img src="수로왕릉.jpg" alt="수로왕릉" class="spot-img">
                <div class="spot-name">수로왕릉</div>
                <div class="spot-desc">국가유산이며 금관가야 초대 국왕 세조 수로왕이 안장된 왕릉.</div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">추천 음식</div>
        <div class="food-list">
            <div class="food-item">
                <span class="food-num">01</span>
                <div>
                    <div class="food-name">통영 충무김밥</div>
                    <div class="food-desc">맨김밥과 반찬을 같이 먹는 형태의 통영의 옛 이름을 딴 대표 김밥.</div>
                </div>
            </div>
            <div class="food-item">
                <span class="food-num">02</span>
                <div>
                    <div class="food-name">부산 돼지국밥</div>
                    <div class="food-desc">6.25 전쟁 당시 피난민들이 먹는 것과 여러 이유로 부산에 자리잡은 대표음식.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="tpage.js"></script>
</body>
</html>
